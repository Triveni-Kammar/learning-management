<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses · CodeCanvas</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7b2eda;
            --primary-light: #f0e6ff;
            --primary-dark: #5b1fa8;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.5;
        }

        .app-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            transition: var(--transition);
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-light);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--text-dark);
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--primary);
        }

        .sidebar-nav {
            flex: 1;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar-nav ul {
            list-style: none;
        }

        .sidebar-nav li {
            margin-bottom: 4px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .sidebar-nav a i {
            width: 24px;
            font-size: 1.1rem;
            margin-right: 12px;
        }

        .sidebar-nav li.active a {
            background: var(--primary-light);
            color: var(--primary);
        }

        .sidebar-nav a:hover {
            background: var(--border-light);
            color: var(--text-dark);
        }

        .sidebar-bottom {
            margin-top: auto;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
        }

        .sidebar-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border-light);
        }

        .user-mini {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        .user-role {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            min-width: 0;
        }

        .top-navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border-light);
            padding: 12px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 90;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.9);
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .page-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            width: 300px;
        }

        .search-box i {
            color: var(--text-light);
            margin-right: 8px;
        }

        .search-box input {
            border: none;
            background: none;
            outline: none;
            width: 100%;
        }

        .notifications {
            position: relative;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .notification-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            border: 2px solid var(--surface);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
        }

        /* Courses Content */
        .courses-container {
            padding: 32px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .filter-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 20px;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .filter-tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 24px;
        }

        .course-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }

        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .course-thumbnail {
            width: 100%;
            height: 160px;
            position: relative;
            overflow: hidden;
        }

        .course-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .course-card:hover .course-thumbnail img {
            transform: scale(1.05);
        }

        .course-category {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255,255,255,0.95);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary);
        }

        .course-progress-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .course-content {
            padding: 20px;
        }

        .course-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .course-instructor {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .course-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .course-rating {
            color: #fbbf24;
        }

        .course-progress {
            margin-top: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border-light);
            border-radius: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 30px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--text-light);
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .loading-spinner {
            text-align: center;
            padding: 60px;
            grid-column: 1 / -1;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .menu-toggle {
                display: block;
            }
            
            .courses-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .courses-container {
                padding: 20px;
            }
            
            .courses-grid {
                grid-template-columns: 1fr;
            }
            
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .search-box {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="logo">Code<span>Canvas</span></a>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="dashboard.html">
                            <i class="fas fa-home"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="active">
                        <a href="my-courses.html">
                            <i class="fas fa-book-open"></i>
                            <span>My Courses</span>
                        </a>
                    </li>
                    <li>
                        <a href="certificates.html">
                            <i class="fas fa-certificate"></i>
                            <span>Certificates</span>
                        </a>
                    </li>
                </ul>
                
                <ul class="sidebar-bottom">
                    <li>
                        <a href="settings.html">
                            <i class="fas fa-cog"></i>
                            <span>Settings</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" id="logoutBtn">
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Logout</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-mini">
                    <div class="user-avatar-small" id="sidebarAvatar">JD</div>
                    <div class="user-info">
                        <div class="user-name" id="sidebarName">John Doe</div>
                        <div class="user-role">Student</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-navbar">
                <div class="navbar-left">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="page-title">My Courses</div>
                </div>
                
                <div class="navbar-right">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search my courses...">
                    </div>
                    
                    <div class="notifications">
                        <i class="far fa-bell"></i>
                        <span class="notification-dot"></span>
                    </div>
                    
                    <div class="user-avatar" id="headerAvatar">JD</div>
                </div>
            </header>

            <div class="courses-container">
                <div class="page-header">
                    <h1>My Purchased Courses</h1>
                    <div class="filter-tabs">
                        <span class="filter-tab active" data-filter="all">All Courses</span>
                        <span class="filter-tab" data-filter="in-progress">In Progress</span>
                        <span class="filter-tab" data-filter="completed">Completed</span>
                    </div>
                </div>

                <div class="courses-grid" id="coursesGrid">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                        <p>Loading your purchased courses...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // IMPORTANT: Clear any sample/demo courses immediately
        function clearAllSampleCourses() {
            let enrolledCourses = JSON.parse(localStorage.getItem('enrolledCourses')) || [];
            
            // Filter out any courses that don't have a valid purchase from checkout
            // Only keep courses that were purchased through the payment process
            const validPurchasedCourses = enrolledCourses.filter(course => {
                // Check if course has a valid purchase timestamp and came from checkout
                return course.purchasedFromCheckout === true || 
                       (course.purchaseDate && course.purchaseDate !== 'Just enrolled' && 
                        course.purchaseDate !== 'Just purchased' &&
                        course.id && typeof course.id === 'number');
            });
            
            // If there are any invalid courses, remove them
            if (validPurchasedCourses.length !== enrolledCourses.length) {
                console.log('Removing sample/demo courses. Found:', enrolledCourses.length, 'Removed:', enrolledCourses.length - validPurchasedCourses.length);
                localStorage.setItem('enrolledCourses', JSON.stringify(validPurchasedCourses));
            }
            
            return validPurchasedCourses;
        }

        // Load user data
        function loadUserData() {
            const user = JSON.parse(localStorage.getItem('lms_user')) || {
                name: 'John Doe',
                email: 'john@example.com',
                avatar: 'JD'
            };

            const avatarText = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
            document.getElementById('sidebarName').textContent = user.name;
            document.getElementById('sidebarAvatar').textContent = avatarText;
            document.getElementById('headerAvatar').textContent = avatarText;
        }

        // Load ONLY purchased courses (no samples/demos)
        function loadPurchasedCourses(filter = 'all', searchTerm = '') {
            const grid = document.getElementById('coursesGrid');
            
            // Show loading state
            grid.innerHTML = `
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Loading your purchased courses...</p>
                </div>
            `;
            
            setTimeout(() => {
                try {
                    // Get purchased courses from localStorage
                    let purchasedCourses = JSON.parse(localStorage.getItem('purchasedCoursesList')) || [];
                    
                    // Also check enrolledCourses (for backward compatibility)
                    let enrolledCourses = JSON.parse(localStorage.getItem('enrolledCourses')) || [];
                    
                    // Combine and deduplicate, but ONLY keep courses with purchase proof
                    let allCourses = [...purchasedCourses];
                    
                    // Add from enrolledCourses only if they have purchase proof
                    enrolledCourses.forEach(course => {
                        const exists = allCourses.some(c => c.id === course.id);
                        if (!exists && (course.purchasedFromCheckout === true || course.paymentId)) {
                            allCourses.push(course);
                        }
                    });
                    
                    // Remove any sample/demo courses
                    allCourses = allCourses.filter(course => {
                        // Don't show sample courses
                        const isSample = course.isSample === true || 
                                       course.title === "Complete Web Development Bootcamp" && !course.paymentId ||
                                       course.title === "Advanced React & Next.js" && !course.paymentId;
                        return !isSample;
                    });
                    
                    console.log('Purchased courses to display:', allCourses);
                    
                    // Check for newly purchased courses in sessionStorage (from payment success page)
                    const newlyPurchased = JSON.parse(sessionStorage.getItem('newlyPurchasedCourses'));
                    if (newlyPurchased && newlyPurchased.length > 0) {
                        console.log('Adding newly purchased courses:', newlyPurchased);
                        
                        // Add newly purchased courses
                        newlyPurchased.forEach(course => {
                            const exists = allCourses.some(c => c.id === course.id);
                            if (!exists) {
                                const purchasedCourse = {
                                    id: course.id,
                                    title: course.title,
                                    thumbnail: course.thumbnail,
                                    category: course.category || 'Web Development',
                                    price: course.price || 49.99,
                                    purchaseDate: new Date().toISOString(),
                                    progress: 0,
                                    instructor: course.instructor || 'CodeCanvas Team',
                                    rating: course.rating || 4.5,
                                    duration: course.duration || '10 hours',
                                    videoId: course.videoId,
                                    purchasedFromCheckout: true,
                                    paymentId: 'PAY-' + Date.now()
                                };
                                allCourses.push(purchasedCourse);
                            }
                        });
                        
                        // Save to localStorage
                        localStorage.setItem('purchasedCoursesList', JSON.stringify(allCourses));
                        // Clear session storage
                        sessionStorage.removeItem('newlyPurchasedCourses');
                    }
                    
                    // Filter based on progress
                    let filteredCourses = [...allCourses];
                    
                    if (filter === 'in-progress') {
                        filteredCourses = allCourses.filter(course => course.progress > 0 && course.progress < 100);
                    } else if (filter === 'completed') {
                        filteredCourses = allCourses.filter(course => course.progress === 100);
                    }
                    
                    // Apply search filter
                    if (searchTerm && searchTerm.trim()) {
                        filteredCourses = filteredCourses.filter(course => 
                            course.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                            (course.category && course.category.toLowerCase().includes(searchTerm.toLowerCase()))
                        );
                    }
                    
                    // Show courses or empty state
                    if (filteredCourses.length === 0) {
                        let emptyMessage = '';
                        if (allCourses.length === 0) {
                            emptyMessage = `
                                <div class="empty-state">
                                    <i class="fas fa-shopping-cart"></i>
                                    <h3>No Purchased Courses Yet</h3>
                                    <p>You haven't purchased any courses yet. Browse our courses and start learning!</p>
                                    <a href="courses.html" class="btn-primary">Browse Courses</a>
                                </div>
                            `;
                        } else if (filter === 'in-progress') {
                            emptyMessage = `
                                <div class="empty-state">
                                    <i class="fas fa-play-circle"></i>
                                    <h3>No Courses In Progress</h3>
                                    <p>Start any of your purchased courses to see them here</p>
                                    <a href="courses.html" class="btn-primary">Browse Courses</a>
                                </div>
                            `;
                        } else if (filter === 'completed') {
                            emptyMessage = `
                                <div class="empty-state">
                                    <i class="fas fa-trophy"></i>
                                    <h3>No Completed Courses Yet</h3>
                                    <p>Keep learning and complete your purchased courses to earn certificates!</p>
                                    <a href="courses.html" class="btn-primary">Continue Learning</a>
                                </div>
                            `;
                        } else {
                            emptyMessage = `
                                <div class="empty-state">
                                    <i class="fas fa-search"></i>
                                    <h3>No Matching Courses Found</h3>
                                    <p>Try a different search term</p>
                                </div>
                            `;
                        }
                        grid.innerHTML = emptyMessage;
                        return;
                    }
                    
                    // Display purchased courses grid
                    grid.innerHTML = filteredCourses.map(course => `
                        <div class="course-card" onclick="openCourse(${course.id})">
                            <div class="course-thumbnail">
                                <img src="${course.thumbnail || 'https://via.placeholder.com/400x200/7b2eda/ffffff?text=' + encodeURIComponent(course.title.substring(0, 20))}" 
                                     alt="${escapeHtml(course.title)}"
                                     onerror="this.src='https://via.placeholder.com/400x200/7b2eda/ffffff?text=Course'">
                                <span class="course-category">${escapeHtml(course.category || 'Course')}</span>
                                ${course.progress > 0 ? 
                                    `<span class="course-progress-badge">${course.progress}%</span>` : 
                                    `<span class="course-progress-badge">New</span>`
                                }
                            </div>
                            <div class="course-content">
                                <h3 class="course-title">${escapeHtml(course.title)}</h3>
                                <div class="course-instructor">
                                    <i class="fas fa-user-graduate"></i>
                                    <span>${escapeHtml(course.instructor || 'CodeCanvas Team')}</span>
                                </div>
                                <div class="course-meta">
                                    <span><i class="far fa-clock"></i> ${course.duration || '10 hours'}</span>
                                    <span class="course-rating">
                                        <i class="fas fa-star"></i> ${course.rating || '4.5'}
                                    </span>
                                </div>
                                <div class="course-progress">
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${course.progress || 0}%"></div>
                                    </div>
                                    <div class="progress-text">
                                        <span>${course.progress || 0}% Complete</span>
                                        <span><i class="fas fa-calendar-alt"></i> ${formatDate(course.purchaseDate)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                    
                } catch (error) {
                    console.error('Error loading purchased courses:', error);
                    grid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>Error Loading Courses</h3>
                            <p>There was an error loading your purchased courses. Please refresh the page.</p>
                            <button onclick="location.reload()" class="btn-primary">Refresh Page</button>
                        </div>
                    `;
                }
            }, 500);
        }
        
        // Format date function
        function formatDate(dateString) {
            if (!dateString) return 'Just purchased';
            try {
                const date = new Date(dateString);
                const now = new Date();
                const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
                
                if (diffDays === 0) return 'Today';
                if (diffDays === 1) return 'Yesterday';
                if (diffDays < 7) return `${diffDays} days ago`;
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            } catch(e) {
                return 'Just purchased';
            }
        }
        
        // Open course function
        function openCourse(courseId) {
            window.location.href = `course-player.html?id=${courseId}`;
        }
        
        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Search functionality
        let currentFilter = 'all';
        let currentSearchTerm = '';
        
        function refreshCourses() {
            loadPurchasedCourses(currentFilter, currentSearchTerm);
        }
        
        // Initialize event listeners
        function initEventListeners() {
            // Filter tabs
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.getAttribute('data-filter');
                    refreshCourses();
                });
            });
            
            // Search input
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    currentSearchTerm = e.target.value;
                    refreshCourses();
                });
            }
            
            // Menu toggle
            const menuToggle = document.getElementById('menuToggle');
            if (menuToggle) {
                menuToggle.addEventListener('click', function() {
                    document.getElementById('sidebar').classList.toggle('active');
                });
            }
            
            // Logout
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (confirm('Are you sure you want to logout?')) {
                        localStorage.removeItem('lms_user');
                        localStorage.removeItem('access_token');
                        window.location.href = 'login.html';
                    }
                });
            }
        }
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            console.log('My Courses page loaded - showing only purchased courses');
            
            // Clear any sample/demo courses
            clearAllSampleCourses();
            
            loadUserData();
            initEventListeners();
            
            // Load only purchased courses
            loadPurchasedCourses('all', '');
            
            // Listen for storage events
            window.addEventListener('storage', function(e) {
                if (e.key === 'purchasedCoursesList' || e.key === 'enrolledCourses') {
                    console.log('Storage event detected - refreshing courses');
                    refreshCourses();
                }
            });
        });
    </script>
</body>
</html>
