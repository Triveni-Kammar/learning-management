        :root {
            --background: #f8fafc;
            --surface: #ffffff;
            --primary: #7b2eda;
            --primary-dark: #5b1fa8;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
            --success: #10b981;
            --card-shadow: 0 20px 30px -10px rgba(0,0,0,0.05);
            --radius-lg: 20px;
            --radius-md: 14px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 40px;
        }

        body {
            background: var(--background);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Navigation */
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(4px);
            background: rgba(255,255,255,0.9);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--text-main);
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 28px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .cart-icon {
            margin-left: 20px;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            padding: 8px 16px;
            background: #f1f4f9;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #cartCount {
            background: var(--primary);
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 5px;
        }

        /* Cart Sidebar */
        .cart-sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .cart-sidebar-overlay.active {
            display: block;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.1);
            transition: right 0.3s ease;
            z-index: 1001;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--primary);
            color: white;
        }

        .cart-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            background: white;
        }

        .cart-item-img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .cart-item-remove {
            color: #ef4444;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 4px;
            display: inline-block;
        }

        .cart-footer {
            padding: 24px;
            border-top: 1px solid var(--border);
            background: #f8fafc;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .checkout-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .empty-cart {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        /* Course Detail */
        .course-header {
            background: #1c1d1f;
            color: white;
            padding: 40px 0;
        }

        .header-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            position: relative;
        }

        .course-info h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .course-description {
            font-size: 1.1rem;
            color: #f7f9fa;
            margin-bottom: 20px;
        }

        .course-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
            font-size: 0.95rem;
        }

        .rating {
            color: #f69c08;
            font-weight: 700;
        }

        .stars {
            color: #f69c08;
            letter-spacing: 2px;
        }

        .instructor {
            color: #c0c4fc;
            text-decoration: underline;
            cursor: pointer;
        }

        /* Sidebar Card */
        .course-sidebar {
            position: absolute;
            right: 20px;
            top: 0;
            width: 340px;
            background: white;
            border: 1px solid #d1d7dc;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .sidebar-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #1e293b;
            cursor: pointer;
        }

        .sidebar-content {
            padding: 24px;
        }

        .price-tag {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 15px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-success {
            background: var(--success);
            color: white;
            cursor: default;
        }

        .includes-list {
            list-style: none;
            margin: 20px 0;
        }

        .includes-list li {
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
        }

        /* What you'll learn */

            border: 1px solid var(--border);
            padding: 24px;
            margin: 40px 0;
            background: var(--surface);
            border-radius: var(--radius-md);
        }

            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;

        .learn-item {

            gap: 10px;
            align-items: flex-start;
        }

        .learn-item i {
            color: var(--success);

            margin-bottom: 10px;
            background: var(--surface);
            border-radius: var(--radius-md);

            font-weight: 600;
            border-bottom: 1px solid var(--border);

            justify-content: space-between;

            display: flex;
            justify-content: space-between;

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            width: 90%;
            max-width: 900px;
            background: black;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 2001;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

                grid-template-columns: 1fr;

                width: 100%;
                margin-top: 30px;
            }

                grid-template-columns: 1fr;
            }

            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--text-muted);

            padding: 50px;
            color: #ef4444;

        // Video Modal Functions
        function openVideoModal(videoId, playlistId) {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('videoIframe');
            if (playlistId) {
                iframe.src = `https://www.youtube.com/embed/videoseries?list=${playlistId}&autoplay=1`;
            } else {
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            }
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeVideoModal() {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('videoIframe');
            iframe.src = '';
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Cart functions
        function openCartSidebar() {
            document.getElementById('cartSidebar').classList.add('open');
            document.getElementById('cartOverlay').classList.add('active');
            displayCartItems();
        }

        function closeCartSidebar() {
            document.getElementById('cartSidebar').classList.remove('open');
            document.getElementById('cartOverlay').classList.remove('active');
        }

        function displayCartItems() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartItems = document.getElementById('cartItems');
            const cartFooter = document.getElementById('cartFooter');
            
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart"></i>
                        <p>Your cart is empty</p>
                    </div>
                `;
                cartFooter.style.display = 'none';
                return;
            }

            let total = 0;
            let itemsHtml = '';
            
            cart.forEach(item => {
                total += item.price || 49.99;
                itemsHtml += `
                    <div class="cart-item">
                        <img src="https://img.youtube.com/vi/${item.videoId}/hqdefault.jpg" alt="${item.title}" class="cart-item-img">
                        <div class="cart-item-details">
                            <div class="cart-item-title">${item.title.substring(0, 40)}${item.title.length > 40 ? '...' : ''}</div>
                            <div class="cart-item-price">$${(item.price || 49.99).toFixed(2)}</div>
                            <span class="cart-item-remove" onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i> Remove</span>
                        </div>
                    </div>
                `;
            });

            cartItems.innerHTML = itemsHtml;
            document.getElementById('cartTotal').textContent = `$${total.toFixed(2)}`;
            cartFooter.style.display = 'block';
        }

        function removeFromCart(courseId) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart = cart.filter(item => item.id !== courseId);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            displayCartItems();
            updateButtonState(courseId);
        }

        function addToCart(courseId) {
            const user = localStorage.getItem('lms_user');
            if (!user) {
                alert("Please log in to add courses to cart");
                window.location.href = 'login.html';
                return;
            }

            const course = courseList.find(c => c.id === courseId);
            if (!course) return;

            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            if (!cart.some(item => item.id === courseId)) {
                cart.push(course);
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                displayCartItems();
                updateButtonState(courseId);
                alert('Course added to cart!');
            }
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cartCount').textContent = cart.length;
        }

        function isInCart(courseId) {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            return cart.some(item => item.id === courseId);
        }

        function updateButtonState(courseId) {
            const addToCartBtn = document.getElementById('addToCartBtn');
            if (addToCartBtn) {
                if (isInCart(courseId)) {
                    addToCartBtn.innerHTML = '<i class="fas fa-check"></i> Added to Cart';
                    addToCartBtn.classList.remove('btn-primary');
                    addToCartBtn.classList.add('btn-success');
                    addToCartBtn.onclick = () => openCartSidebar();
                } else {
                    addToCartBtn.innerHTML = '<i class="fas fa-cart-plus"></i> Add to Cart';
                    addToCartBtn.classList.remove('btn-success');
                    addToCartBtn.classList.add('btn-primary');
                    addToCartBtn.onclick = () => addToCart(courseId);
                }
            }
        }

        function goToCheckout() {
            window.location.href = 'checkout.html';
        }

                            <!-- Sidebar -->
                            <div class="course-sidebar">

                                     onerror="this.src='https://img.youtube.com/vi/${course.videoId}/hqdefault.jpg'"

                                <div class="sidebar-content">
                                    <div class="price-tag">$${course.price}</div>

                                    <button class="btn btn-outline" onclick="openVideoModal('${course.videoId}', '${course.playlistId || ''}')">
                                        <i class="fas fa-play"></i> Preview
                                    </button>

                                    <h4 style="margin: 20px 0 10px;">This course includes:</h4>
                                    <ul class="includes-list">
                                        <li><i class="fas fa-video"></i> ${course.duration} on-demand video</li>
                                        <li><i class="fas fa-file"></i> 50+ articles</li>
                                        <li><i class="fas fa-download"></i> 30 downloadable resources</li>
                                        <li><i class="fas fa-certificate"></i> Certificate of completion</li>
                                        <li><i class="fas fa-infinity"></i> Full lifetime access</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="container">
                    <!-- What you'll learn -->
                    <div class="learn-section">
                        <h2>What you'll learn</h2>
                        <div class="learn-grid">
                            <div class="learn-item">
                                <i class="fas fa-check-circle"></i>
                                <span>Master ${course.category} fundamentals and advanced concepts</span>
                            </div>
                            <div class="learn-item">
                                <i class="fas fa-check-circle"></i>
                                <span>Build real-world projects and applications</span>
                            </div>
                            <div class="learn-item">
                                <i class="fas fa-check-circle"></i>
                                <span>Understand best practices and industry standards</span>
                            </div>
                            <div class="learn-item">
                                <i class="fas fa-check-circle"></i>
                                <span>Prepare for technical interviews</span>
                            </div>
                            <div class="learn-item">
                                <i class="fas fa-check-circle"></i>
                                <span>Get hands-on experience with practical exercises</span>
                            </div>
                            <div class="learn-item">
                                <i class="fas fa-check-circle"></i>
                                <span>Earn a certificate of completion</span>
                            </div>
                        </div>
                    </div>

                    <!-- Course Syllabus -->
                    <div class="syllabus-section">
                        <h2 style="margin-bottom: 20px;">Course content</h2>
                        <div style="margin-bottom: 15px; color: var(--text-muted);">
                            ${sections.length} sections • ${totalLessons} lectures • ${totalLessons * 15} minutes total length
                        </div>
                        
                        ${sections.map((section, idx) => `
                            <div class="section-box">
                                <div class="section-header">
                                    <span>${section.title}</span>
                                    <span>${section.lessons.length} lectures • ${section.lessons.length * 15} min</span>

                                <div>
                                    ${section.lessons.map(lesson => `
                                        <div class="lesson-item">
                                            <span class="lesson-title">

                            </div>

                    </div>
                </div>
            `;

            // Update button state based on cart
            updateButtonState(courseId);

            // Add to cart functionality
            window.addToCart = addToCart;
        });

        // Logout function
        window.logout = function() {
            localStorage.removeItem('lms_user');
            localStorage.removeItem('access_token');
            window.location.href = 'index.html';
        };

        // Initialize cart count
        updateCartCount();

        // Click outside to close sidebar
        document.getElementById('cartOverlay').addEventListener('click', closeCartSidebar);

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeVideoModal();
                closeCartSidebar();
            }
        });
