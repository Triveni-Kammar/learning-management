<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - CodeCanvas</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--space-md);
        }

        .navbar {
            background: var(--surface);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--text-main);
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: var(--space-md);
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .page-header {
            padding: var(--space-xl) 0;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: var(--space-sm);
            color: var(--text-main);
        }

        .content-section {
            padding: var(--space-xl) 0;
            display: flex;
            justify-content: center;
        }

        .contact-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 600px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
            display: inline-block;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .text-muted { color: var(--text-muted); }
        .mt-1 { margin-top: var(--space-sm); }
        .mt-2 { margin-top: var(--space-md); }
        .mt-4 { margin-top: var(--space-xl); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo"><span>Code</span>Canvas</a>
            <div class="nav-links" id="main-nav" style="margin-right: auto; margin-left: 2rem;">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="courses.html">Courses</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="nav-links" id="auth-links">
                <a href="login.html">Login</a>
                <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>Contact Us</h1>
            <p class="text-muted mt-1">We'd love to hear from you. Reach out to our support or sales teams below.</p>
        </div>
    </div>

    <main class="container content-section">
        <div class="contact-box">
            
            <div id="contact-alert"></div>

            <form id="contact-form" onsubmit="submitForm(event)">
                <div class="form-group mb-2">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem;" for="name">Your Name</label>
                    <input type="text" id="name" class="form-control" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);" placeholder="John Doe" required>
                </div>
                <div class="form-group mb-2 mt-2">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem;" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);" placeholder="you@example.com" required>
                </div>
                <div class="form-group mb-2 mt-2">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem;" for="subject">Subject</label>
                    <select id="subject" class="form-control" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);" required>
                        <option value="">Select a subject...</option>
                        <option value="support">Technical Support</option>
                        <option value="billing">Billing & Purchases</option>
                        <option value="enterprise">Enterprise Sales</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group mb-4 mt-2">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem;" for="message">Message</label>
                    <textarea id="message" class="form-control" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);" rows="5" placeholder="How can we help you?" required></textarea>
                </div>
                
                <button type="submit" class="btn-primary">Send Message</button>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('lms_user'));
            if (user) {
                document.getElementById('auth-links').innerHTML = `
                    <a href="dashboard.html">Dashboard</a>
                    <a href="#" onclick="logout()">Logout</a>
                `;
            }
        });

        function logout() {
            localStorage.removeItem('lms_user');
            window.location.reload();
        }

        function submitForm(event) {
            event.preventDefault();
            const alertDiv = document.getElementById('contact-alert');
            alertDiv.innerHTML = '<div style="background: #e6f4ea; color: #1e8e3e; padding: 10px; border-radius: 4px; margin-bottom: 20px; text-align: center;">✅ Thank you for contacting us! Our team will get back to you shortly.</div>';
            document.getElementById('contact-form').reset();
            
            setTimeout(() => {
                alertDiv.innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
